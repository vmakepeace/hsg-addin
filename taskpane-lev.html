<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSG258 LEV Recommendations</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="hsg-recs.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1F497D;
      --accent-light: #EEF3F9;
      --accent-mid: #2E75B6;
      --border: #D0D0D0;
      --border-light: #E8E8E8;
      --text: #1a1a1a;
      --text-2: #555;
      --text-3: #999;
      --bg: #F5F5F5;
      --surface: #FFFFFF;
      --success: #1a4a2e;
      --success-light: #E8F0EB;
      --radius: 4px;
    }

    html, body {
      height: 100%;
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    .layout { display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    .header {
      background: var(--accent);
      color: white;
      padding: 10px 12px 8px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
    .header p  { font-size: 11px; opacity: 0.65; margin-top: 1px; }

    /* Section tabs */
    .section-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-tabs label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      white-space: nowrap;
    }
    .section-tabs select {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 8px;
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      background: var(--accent-light);
      color: var(--accent);
      outline: none;
      cursor: pointer;
      flex: 1;
    }
    .section-tabs select:focus { border-color: var(--accent-mid); }

    /* Search */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 10px;
      flex-shrink: 0;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 5px 8px 5px 26px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent-mid); background: white; }
    .search-wrap input::placeholder { color: var(--text-3); }
    .search-icon {
      position: absolute; left: 7px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
      width: 13px; height: 13px;
    }

    /* List */
    .list-wrap { flex: 1; overflow-y: auto; padding: 6px 10px 10px; }

    .sec-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0 4px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 2px;
    }
    .sec-header-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
    }
    .sec-all-btn {
      background: none; border: none; font-family: inherit;
      font-size: 10px; color: var(--text-3); cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
      padding: 0;
    }
    .sec-all-btn:hover { color: var(--accent); }

    .rec-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
    }
    .rec-row:last-child { border-bottom: none; }
    .rec-row:hover { background: var(--accent-light); margin: 0 -4px; padding-left: 4px; padding-right: 4px; border-radius: var(--radius); }

    .cb {
      width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px;
      border: 1.5px solid var(--border);
      border-radius: 2px; background: white;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-row.checked .cb { background: var(--accent); border-color: var(--accent); }
    .cb-tick { display: none; }
    .rec-row.checked .cb-tick { display: block; }

    .rec-label { font-size: 12px; line-height: 1.45; color: var(--text); flex: 1; }

    .empty-msg {
      text-align: center; color: var(--text-3); font-size: 12px; padding: 24px 0;
    }

    /* Footer */
    .footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .footer-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .sel-count { font-size: 11px; color: var(--text-2); white-space: nowrap; }
    .sel-count strong { color: var(--accent); }

    .btn-clear {
      font-family: inherit; font-size: 11px;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 5px 10px;
      color: var(--text-2); cursor: pointer; white-space: nowrap;
    }
    .btn-clear:hover { border-color: var(--text-2); color: var(--text); }

    .btn-insert {
      font-family: inherit; font-size: 12px; font-weight: 600;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius);
      padding: 7px 14px; cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn-insert:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-insert:not(:disabled):hover  { opacity: 0.88; }
    .btn-insert:not(:disabled):active { opacity: 0.75; }

    .status {
      font-size: 11px; padding: 5px 8px; border-radius: var(--radius);
      display: none; text-align: center;
    }
    .status.ok  { display: block; background: var(--success-light); color: var(--success); }
    .status.err { display: block; background: #FDECEA; color: #8B1A1A; }
  </style>
</head>
<body>
<div class="layout">

  <div class="header">
    <h1>HSG258 LEV Recommendations</h1>
    <p>Select items and insert into the active cell</p>
  </div>

  <div class="section-tabs">
    <label for="section-select">Section:</label>
    <select id="section-select"></select>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 13 13" fill="none">
        <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="7.5" y1="7.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search" placeholder="Search recommendations" oninput="render()">
    </div>
  </div>

  <div class="list-wrap">
    <div id="rec-list"></div>
    <div class="empty-msg" id="empty-msg" style="display:none;">No recommendations match.</div>
  </div>

  <div class="footer">
    <div class="footer-row">
      <span class="sel-count" id="sel-count"><strong>0</strong> selected</span>
      <button class="btn-clear" onclick="clearAll()">Clear all</button>
    </div>
    <div class="status" id="status"></div>
    <button class="btn-insert" id="insert-btn" disabled onclick="insertIntoExcel()">
      Insert into active cell
    </button>
  </div>

</div>
<script>

  //  State 
  let activeSection = HSG_SECTIONS[0];
  let selected = new Set();   // keys: "sectionName|itemId"

  function key(sec, id) { return sec + "|" + id; }

  //  Init 
  Office.onReady(() => {
    buildTabs();
    render();
  });

  //  Tabs 
  function buildTabs() {
    const el = document.getElementById("section-select");
    el.innerHTML = HSG_SECTIONS.map(sec =>
      `<option value="${sec.replace(/"/g,'&quot;')}"${sec === activeSection ? " selected" : ""}>${sec}</option>`
    ).join("");
    el.onchange = () => setSection(el.value);
  }

  function setSection(sec) {
    activeSection = sec;
    document.getElementById("search").value = "";
    render();
  }

  //  Visible items 
  function getVisible() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    const items = HSG_DATA[activeSection] || [];
    if (!q) return items;
    return items.filter(r =>
      r.label.toLowerCase().includes(q) || r.text.toLowerCase().includes(q)
    );
  }

  //  Render 
  function render() {
    const visible = getVisible();
    const sec     = activeSection;
    const listEl  = document.getElementById("rec-list");
    const emptyEl = document.getElementById("empty-msg");

    if (visible.length === 0) {
      listEl.innerHTML = "";
      emptyEl.style.display = "block";
      updateFooter();
      return;
    }
    emptyEl.style.display = "none";

    const allChecked = visible.every(r => selected.has(key(sec, r.id)));

    const rows = visible.map(r => {
      const chk = selected.has(key(sec, r.id));
      return `<div class="rec-row${chk ? " checked" : ""}" data-sec="${sec.replace(/"/g,'&quot;')}" data-id="${r.id}">
        <div class="cb">
          <svg class="cb-tick" width="9" height="9" viewBox="0 0 9 9" fill="none">
            <polyline points="1,4.5 3.5,7 8,1.5" stroke="white" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="rec-label">${escHtml(r.label)}</span>
      </div>`;
    }).join("");

    listEl.innerHTML = `
      <div class="sec-header">
        <span class="sec-header-label">${escHtml(sec)}</span>
        <button class="sec-all-btn" data-sec="${sec.replace(/"/g,'&quot;')}" data-all="${allChecked}">
          ${allChecked ? "None" : "All"}
        </button>
      </div>
      ${rows}`;

    // Attach event listeners after innerHTML is set
    listEl.querySelectorAll('.rec-row').forEach(row => {
      row.addEventListener('click', () => toggle(row.dataset.sec, parseInt(row.dataset.id)));
    });
    listEl.querySelectorAll('.sec-all-btn').forEach(btn => {
      btn.addEventListener('click', () => toggleAll(btn.dataset.sec, btn.dataset.all === 'true'));
    });

    updateFooter();
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function toggle(sec, id) {
    const k = key(sec, id);
    selected.has(k) ? selected.delete(k) : selected.add(k);
    render();
  }

  function toggleAll(sec, wasAll) {
    getVisible().forEach(r => {
      const k = key(sec, r.id);
      wasAll ? selected.delete(k) : selected.add(k);
    });
    render();
  }

  function clearAll() {
    selected.clear();
    render();
    hideStatus();
  }

  function updateFooter() {
    document.getElementById("sel-count").innerHTML = `<strong>${selected.size}</strong> selected`;
    document.getElementById("insert-btn").disabled = selected.size === 0;
  }

  //  Insert into Excel 
  // Collects all selected texts (in section order, then item order within section),
  // joins them with a newline, then writes to the active cell whilst inheriting
  // the existing cell's font name, size, bold, italic, and colour.
  async function insertIntoExcel() {
    // Build ordered list of texts
    const texts = [];
    for (const sec of HSG_SECTIONS) {
      const items = (HSG_DATA[sec] || []).filter(r => selected.has(key(sec, r.id)));
      items.forEach(r => texts.push(r.text));
    }
    if (texts.length === 0) return;

    try {
      await Excel.run(async (context) => {
        const sel = context.workbook.getSelectedRange();
        sel.load(["format/font/name","format/font/size","format/font/bold","format/font/italic","format/font/color"]);
        await context.sync();

        const fontName   = sel.format.font.name   || "Calibri";
        const fontSize   = sel.format.font.size   || 11;
        const fontBold   = sel.format.font.bold   || false;
        const fontItalic = sel.format.font.italic || false;
        const fontColor  = sel.format.font.color  || "#000000";

        // Write to top-left cell only - handles merged cells correctly
        const combined = texts.join("\n");
        const cell = sel.getCell(0, 0);
        cell.values = [[combined]];

        // Re-apply format to match destination
        sel.format.wrapText = true;
        sel.format.font.name   = fontName;
        sel.format.font.size   = fontSize;
        sel.format.font.bold   = fontBold;
        sel.format.font.italic = fontItalic;
        sel.format.font.color  = fontColor;
        sel.format.autofitRows();

        await context.sync();
      });

      const count = texts.length;
      selected.clear();
      render();
      showStatus("ok", `${count} recommendation${count !== 1 ? "s" : ""} inserted.`);

    } catch (err) {
      console.error(err);
      const detail = err.message || (err.debugInfo && err.debugInfo.message) || JSON.stringify(err);
      showStatus("err", detail);
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = "status " + type;
    el.textContent = msg;
    if (type === "ok") setTimeout(hideStatus, 4000);
  }
  function hideStatus() {
    document.getElementById("status").className = "status";
  }

</script>
</body>
</html>
